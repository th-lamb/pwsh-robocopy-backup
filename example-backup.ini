; Settings for the backup script.
; --------------------------------------------------------------------------------

; Path to the robocopy executable.
; If only "robocopy" is specified, the script searches in the Windows PATH.
ROBOCOPY=robocopy

; Directory where the RCJ templates are stored.
BACKUP_TEMPLATES_DIR=templates

; Template for the directory list.
DIRLIST_TEMPLATE=templates\dir-list-template.conf

; Templates for the different job types.
ROBOCOPY_JOB_TYPE_TEMPLATE_INCR=templates\incr_backup.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_FULL=templates\full_backup.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_PURGE=templates\purge.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_ARCHIVE=templates\only_archive_attr.RCJ

; Global templates.
ROBOCOPY_JOB_TEMPLATE_GLOBAL_EXCLUSIONS=templates\global_exclusions.RCJ
ROBOCOPY_JOB_TEMPLATE_LOGGING=templates\logging.RCJ

; Base directory where the backups will be stored.
; Can be a directory, a drive letter (e.g., "D:\"), or a network share (e.g., "\\Server\Share").
BACKUP_BASE_DIR=C:\Backups

; The user-specific base directory (e.g., %COMPUTERNAME%).
; Note: Environment variables like %COMPUTERNAME% are supported.
BACKUP_USER_BASE_DIR=%COMPUTERNAME%

; The final backup directory.
; Note: Script variables like ${BACKUP_BASE_DIR} can be reused if defined above.
BACKUP_DIR=${BACKUP_BASE_DIR}\${BACKUP_USER_BASE_DIR}

; Directory where the generated job files will be stored.
BACKUP_JOB_DIR=config\robocopy-jobs

; The directory list file.
BACKUP_DIRLIST=dir-list.conf

; The log files.
BACKUP_LOGFILE=backup.log
ERROR_LOGFILE=error.log

; Default job type if none is selected.
DEFAULT_JOB_TYPE=Incremental

; Naming schemes for the job files and archives.
JOB_FILE_NAME_SCHEME=*-Job*.RCJ
JOB_LOGFILE_NAME_SCHEME=*-Job*.log
ARCHIVE_NAME_SCHEME=BackupJobs_*.zip

; Maximum number of archives to keep.
MAX_ARCHIVES_COUNT=10
