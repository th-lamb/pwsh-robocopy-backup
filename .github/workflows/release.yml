name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-version:
    name: Validate Version Consistency
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare Script Version with Tag
        shell: pwsh
        run: |
          # 1. Get the tag name (e.g., v0.1.00)
          $tagName = "${{ github.ref_name }}"
          # Remove the 'v' prefix for comparison
          $expectedVersion = $tagName.TrimStart('v')

          # 2. Extract SCRIPT_VERSION from backup.ps1
          # We look for: Set-Variable -Name "SCRIPT_VERSION" -Option ReadOnly -Value "0.2.00"
          $versionLine = Get-Content "backup.ps1" | Select-String "Set-Variable -Name `"SCRIPT_VERSION`""

          if ($versionLine -match "Value\s`"([0-9\.]+)`"") {
              $actualVersion = $Matches[1]
              Write-Host "Tag version: $expectedVersion"
              Write-Host "Script version: $actualVersion"

              if ($actualVersion -ne $expectedVersion) {
                  Write-Error "CRITICAL: Version mismatch! Script version ($actualVersion) does not match Git tag ($tagName)."
                  exit 1
              }
              Write-Host "SUCCESS: Versions match." -ForegroundColor Green
          }
          else {
              Write-Error "ERROR: Could not find SCRIPT_VERSION in backup.ps1."
              exit 1
          }

  release:
    name: Create Release Package
    needs: validate-version
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create Release Package
        shell: pwsh
        run: |
          # 1. Create temporary folder structure
          New-Item -ItemType Directory -Path "pwsh-robocopy-backup\lib"
          New-Item -ItemType Directory -Path "pwsh-robocopy-backup\templates"

          # 2. Copy main script, templates, and README
          Copy-Item "backup.ps1" "pwsh-robocopy-backup\"
          Copy-Item "example-backup.ini" "pwsh-robocopy-backup\"
          Copy-Item "example-dir-list.conf" "pwsh-robocopy-backup\"
          Copy-Item "README.md" "pwsh-robocopy-backup\"

          # 3. Copy ONLY .ps1 files into the lib folder
          Copy-Item "lib\*.ps1" "pwsh-robocopy-backup\lib\"

          # 4. Copy ONLY template files into the templates folder
          Copy-Item "templates\*.RCJ" "pwsh-robocopy-backup\templates\"
          Copy-Item "templates\*.conf" "pwsh-robocopy-backup\templates\"

          # 5. Create the ZIP archive with the version name
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path "pwsh-robocopy-backup\*" -DestinationPath "pwsh-robocopy-backup-$version.zip"

          # 6. Cleanup
          Remove-Item -Path "pwsh-robocopy-backup" -Recurse -Force

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: pwsh-robocopy-backup-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
