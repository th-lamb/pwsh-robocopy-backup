name: Run Pester Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Pester tests
        shell: pwsh
        run: ./scripts/run-tests.ps1 -CI

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pester-results
          path: testResults.xml
