name: Run Pester Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          # Create and configure the Pester object
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputFormat = 'NUnitXML'
          $pesterConfig.TestResult.OutputPath = 'test-results.xml'
          # Set the path to the tests inside the configuration
          $pesterConfig.Run.Path = './Pester/tests'

          # Run Pester using only the configuration object
          $result = Invoke-Pester -Configuration $pesterConfig

          # Explicitly check the result and exit with an error code if any tests failed
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester tests failed!"
            exit 1
          }
