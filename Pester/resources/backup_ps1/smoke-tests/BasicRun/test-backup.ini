[General]
__VERBOSE=6

[Mandatory directories]
BACKUP_TEMPLATES_DIR=${SCRIPT_DIR}templates\

[Mandatory files]
DIRLIST_TEMPLATE=${BACKUP_TEMPLATES_DIR}dir-list-template.conf

ROBOCOPY_JOB_TYPE_TEMPLATE_INCR=${BACKUP_TEMPLATES_DIR}incr_backup.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_FULL=${BACKUP_TEMPLATES_DIR}full_backup.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_PURGE=${BACKUP_TEMPLATES_DIR}purge.RCJ
ROBOCOPY_JOB_TYPE_TEMPLATE_ARCHIVE=${BACKUP_TEMPLATES_DIR}only_archive_attr.RCJ

ROBOCOPY_JOB_TEMPLATE_GLOBAL_EXCLUSIONS=${BACKUP_TEMPLATES_DIR}global_exclusions.RCJ
ROBOCOPY_JOB_TEMPLATE_LOGGING=${BACKUP_TEMPLATES_DIR}logging.RCJ

[Directories]
BACKUP_BASE_DIR=${SCRIPT_DIR}destination\
BACKUP_USER_BASE_DIR=${BACKUP_BASE_DIR}testuser\
BACKUP_DIR=${BACKUP_USER_BASE_DIR}%COMPUTERNAME%\
BACKUP_JOB_DIR=${BACKUP_USER_BASE_DIR}robocopy-jobs\

[Files]
ROBOCOPY=robocopy

BACKUP_DIRLIST=${SCRIPT_DIR}smoke-test-dir-list.conf
# Smoke-test the special case where $BACKUP_LOGFILE is not in $BACKUP_DIR.
BACKUP_LOGFILE=${SCRIPT_DIR}logdir\Backup.log
ERROR_LOGFILE=${BACKUP_DIR}Error.log

[Job settings]
JOB_TYPE_SELECTION_MAX_WAITING_TIME_S=0
DEFAULT_JOB_TYPE=Incremental

JOB_FILE_NAME_SCHEME=${COMPUTERNAME}-Job*.RCJ
JOB_LOGFILE_NAME_SCHEME=${COMPUTERNAME}-Job*.log

[Archiving settings]
ARCHIVE_NAME_SCHEME=`${COMPUTERNAME}-Jobs-*.zip
MAX_ARCHIVES_COUNT=5

[Robocopy settings]

